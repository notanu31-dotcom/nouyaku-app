<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>農薬希釈計算アプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f8;
      color: #222;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 12px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    p {
      margin: 6px 0;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input,
    select,
    button,
    textarea {
      font-size: 16px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd8dc;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #fff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      background: #2f7d32;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button.sub {
      background: #607d8b;
    }

    button.light {
      background: #eceff1;
      color: #222;
    }

    button.warn {
      background: #d84315;
    }

    button:disabled,
    .disabled-btn {
      background: #cfd8dc !important;
      color: #777 !important;
      cursor: not-allowed;
    }

    .result-box {
      padding: 14px;
      background: #f1f8e9;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.6;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .premium-note {
      color: #c62828;
      font-size: 13px;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .history-item {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .history-title {
      font-weight: 700;
      line-height: 1.5;
    }

    .history-meta {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .ref-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ref-buttons button {
      background: #1565c0;
      padding: 10px 12px;
      font-size: 14px;
    }

    .section-gap {
      margin-top: 8px;
    }

    .muted-box {
      background: #f8f9fa;
      border: 1px dashed #cfd8dc;
      border-radius: 12px;
      padding: 12px;
    }

    @media (max-width: 560px) {
      .row {
        grid-template-columns: 1fr;
      }

      .history-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>農薬希釈計算アプリ</h1>
      <p class="small">
        無料版 / 有料版切り替えは <strong>IS_PREMIUM</strong> で管理
      </p>
    </div>

    <div class="card">
      <h2>希釈計算</h2>

      <label for="fieldSelect">園場</label>
      <select id="fieldSelect"></select>

      <div class="btn-row">
        <button id="addFieldBtn" type="button">園場追加</button>
        <button id="renameFieldBtn" class="sub" type="button">園場名変更</button>
        <button id="resetFieldsBtn" class="warn" type="button">園場初期化</button>
      </div>
      <div id="fieldPremiumNote" class="premium-note" style="display:none;">
        ※有料版で利用できます
      </div>

      <label for="itemName">作物・薬剤名</label>
      <input
        id="itemName"
        type="text"
        placeholder="例：ブロッコリー・○○"
      />

      <div class="section-gap">
        <label>履歴から呼び出し</label>
        <div id="historyRefButtons" class="ref-buttons"></div>
        <p class="small">よく使った履歴を押すと、作物・薬剤名や数値が入力されます。</p>
      </div>

      <label for="tank">タンク容量（L）</label>
      <input id="tank" type="number" inputmode="decimal" placeholder="例：500" />
      <div class="btn-row">
        <button class="light preset-tank" type="button" data-value="200">200L</button>
        <button class="light preset-tank" type="button" data-value="500">500L</button>
        <button class="light preset-tank" type="button" data-value="1000">1000L</button>
      </div>

      <label for="ratio">希釈倍率</label>
      <input id="ratio" type="number" inputmode="decimal" placeholder="例：1000" />
      <div class="btn-row">
        <button class="light preset-ratio" type="button" data-value="1000">1000倍</button>
        <button class="light preset-ratio" type="button" data-value="2000">2000倍</button>
        <button class="light preset-ratio" type="button" data-value="3000">3000倍</button>
      </div>

      <div class="btn-row">
        <button id="calcBtn" type="button">計算する</button>
        <button id="saveBtn" class="sub" type="button">履歴保存</button>
      </div>

      <div class="result-box" id="resultBox">
        薬量：-<br />
        薬量：- L
      </div>
    </div>

    <div class="card">
      <h2>データ管理</h2>
      <div class="btn-row">
        <button id="csvBtn" type="button">CSV書き出し</button>
        <button id="csvFieldBtn" type="button">CSV園場ごと書き出し</button>
        <button id="backupBtn" type="button">バックアップ</button>
        <button id="restoreBtn" type="button">復元</button>
      </div>
      <div id="premiumDataNote" class="premium-note" style="display:none;">
        ※CSV書き出し・バックアップ・復元は有料版で利用できます
      </div>
      <input id="restoreFileInput" type="file" accept=".json" style="display:none;" />
    </div>

    <div class="card">
      <h2>履歴</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    // =========================
    // 設定
    // =========================
    const IS_PREMIUM = false;

    const FREE_HISTORY_LIMIT = 10;
    const PREMIUM_HISTORY_LIMIT = 100;

    const FREE_FIELD_LIMIT = 3;
    const DEFAULT_FIELDS = ["畑A", "畑B", "畑C"];

    const STORAGE_KEYS = {
      history: "nouyaku_history_v2",
      fields: "nouyaku_fields_v2"
    };

    // =========================
    // 要素取得
    // =========================
    const fieldSelect = document.getElementById("fieldSelect");
    const addFieldBtn = document.getElementById("addFieldBtn");
    const renameFieldBtn = document.getElementById("renameFieldBtn");
    const resetFieldsBtn = document.getElementById("resetFieldsBtn");
    const fieldPremiumNote = document.getElementById("fieldPremiumNote");

    const itemName = document.getElementById("itemName");
    const historyRefButtons = document.getElementById("historyRefButtons");

    const tank = document.getElementById("tank");
    const ratio = document.getElementById("ratio");
    const calcBtn = document.getElementById("calcBtn");
    const saveBtn = document.getElementById("saveBtn");
    const resultBox = document.getElementById("resultBox");

    const csvBtn = document.getElementById("csvBtn");
    const csvFieldBtn = document.getElementById("csvFieldBtn");
    const backupBtn = document.getElementById("backupBtn");
    const restoreBtn = document.getElementById("restoreBtn");
    const premiumDataNote = document.getElementById("premiumDataNote");
    const restoreFileInput = document.getElementById("restoreFileInput");

    const historyList = document.getElementById("historyList");

    // =========================
    // 状態
    // =========================
    let historyData = loadHistory();
    let fields = loadFields();

    // =========================
    // 初期化
    // =========================
    init();

    function init() {
      applyPremiumUI();
      renderFields();
      renderHistory();
      renderHistoryRefButtons();
      bindPresetButtons();
      updateResult();
    }

    // =========================
    // Premium制御
    // =========================
    function applyPremiumUI() {
      if (!IS_PREMIUM) {
        addFieldBtn.disabled = true;
        addFieldBtn.classList.add("disabled-btn");
        fieldPremiumNote.style.display = "block";

        csvBtn.disabled = true;
        csvFieldBtn.disabled = true;
        backupBtn.disabled = true;
        restoreBtn.disabled = true;
        premiumDataNote.style.display = "block";
      }
    }

    // =========================
    // ロード / セーブ
    // =========================
    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.history);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(historyData));
    }

    function loadFields() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.fields);
        const parsed = raw ? JSON.parse(raw) : null;
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        return [...DEFAULT_FIELDS];
      } catch (e) {
        return [...DEFAULT_FIELDS];
      }
    }

    function saveFields() {
      localStorage.setItem(STORAGE_KEYS.fields, JSON.stringify(fields));
    }

    // =========================
    // 園場
    // =========================
    function renderFields() {
      fieldSelect.innerHTML = "";
      fields.forEach((field) => {
        const option = document.createElement("option");
        option.value = field;
        option.textContent = field;
        fieldSelect.appendChild(option);
      });
    }

    addFieldBtn.addEventListener("click", () => {
      if (!IS_PREMIUM) return;

      if (!IS_PREMIUM && fields.length >= FREE_FIELD_LIMIT) {
        alert("無料版では園場は3件までです。");
        return;
      }

      const name = prompt("追加する園場名を入力してください");
      if (!name) return;

      const trimmed = name.trim();
      if (!trimmed) return;

      if (fields.includes(trimmed)) {
        alert("同じ園場名があります。");
        return;
      }

      fields.push(trimmed);
      saveFields();
      renderFields();
      fieldSelect.value = trimmed;
    });

    renameFieldBtn.addEventListener("click", () => {
      const current = fieldSelect.value;
      if (!current) return;

      const renamed = prompt("新しい園場名を入力してください", current);
      if (!renamed) return;

      const trimmed = renamed.trim();
      if (!trimmed) return;

      if (fields.includes(trimmed) && trimmed !== current) {
        alert("同じ園場名があります。");
        return;
      }

      const idx = fields.indexOf(current);
      if (idx !== -1) {
        fields[idx] = trimmed;
        saveFields();
        renderFields();
        fieldSelect.value = trimmed;

        historyData = historyData.map((item) => {
          if (item.field === current) {
            return { ...item, field: trimmed };
          }
          return item;
        });
        saveHistory();
        renderHistory();
      }
    });

    resetFieldsBtn.addEventListener("click", () => {
      const ok = confirm("園場を初期状態（畑A/B/C）に戻しますか？");
      if (!ok) return;

      fields = [...DEFAULT_FIELDS];
      saveFields();
      renderFields();
    });

    // =========================
    // プリセット
    // =========================
    function bindPresetButtons() {
      document.querySelectorAll(".preset-tank").forEach((btn) => {
        btn.addEventListener("click", () => {
          tank.value = btn.dataset.value;
          updateResult();
        });
      });

      document.querySelectorAll(".preset-ratio").forEach((btn) => {
        btn.addEventListener("click", () => {
          ratio.value = btn.dataset.value;
          updateResult();
        });
      });
    }

    tank.addEventListener("input", updateResult);
    ratio.addEventListener("input", updateResult);

    calcBtn.addEventListener("click", () => {
      updateResult(true);
    });

    function updateResult(showAlert = false) {
      const tankVal = Number(tank.value);
      const ratioVal = Number(ratio.value);

      if (!tankVal || !ratioVal || tankVal <= 0 || ratioVal <= 0) {
        resultBox.innerHTML = "薬量：-<br>薬量：- L";
        if (showAlert) {
          alert("タンク容量と希釈倍率を入力してください。");
        }
        return;
      }

      const amountL = tankVal / ratioVal;
      const amountMl = amountL * 1000;

      resultBox.innerHTML = `
        薬量：${amountMl.toFixed(1)} ml<br>
        薬量：${amountL.toFixed(3)} L
      `;
    }

    // =========================
    // 履歴保存
    // =========================
    saveBtn.addEventListener("click", () => {
      const field = fieldSelect.value;
      const name = itemName.value.trim();
      const tankVal = Number(tank.value);
      const ratioVal = Number(ratio.value);

      if (!name) {
        alert("作物・薬剤名を入力してください。");
        return;
      }

      if (!tankVal || !ratioVal || tankVal <= 0 || ratioVal <= 0) {
        alert("タンク容量と希釈倍率を入力してください。");
        return;
      }

      const limit = IS_PREMIUM ? PREMIUM_HISTORY_LIMIT : FREE_HISTORY_LIMIT;

      const amountL = tankVal / ratioVal;
      const amountMl = amountL * 1000;

      const record = {
        id: Date.now(),
        date: formatDate(new Date()),
        field,
        itemName: name,
        tank: tankVal,
        ratio: ratioVal,
        amountMl: Number(amountMl.toFixed(1)),
        amountL: Number(amountL.toFixed(3))
      };

      historyData.unshift(record);
      if (historyData.length > limit) {
        historyData = historyData.slice(0, limit);
      }

      saveHistory();
      renderHistory();
      renderHistoryRefButtons();
      alert("履歴を保存しました。");
    });

    // =========================
    // 履歴表示
    // =========================
    function renderHistory() {
      if (historyData.length === 0) {
        historyList.innerHTML = `<p class="small">履歴はまだありません。</p>`;
        return;
      }

      historyList.innerHTML = historyData.map((item) => {
        return `
          <div class="history-item">
            <div class="history-top">
              <div>
                <div class="history-title">${escapeHtml(item.itemName)}</div>
                <div class="history-meta">
                  ${escapeHtml(item.date)} / ${escapeHtml(item.field)}
                </div>
              </div>
              <div class="history-meta">
                ${item.tank}L / ${item.ratio}倍
              </div>
            </div>

            <div class="history-meta">
              薬量：${item.amountMl} ml / ${item.amountL} L
            </div>

            <div class="history-actions">
              <button type="button" class="light" onclick="reuseHistory(${item.id})">この内容を呼び出す</button>
              <button type="button" class="warn" onclick="deleteHistory(${item.id})">削除</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderHistoryRefButtons() {
      if (historyData.length === 0) {
        historyRefButtons.innerHTML = `<span class="small">履歴がありません</span>`;
        return;
      }

      const uniqueItems = [];
      const used = new Set();

      for (const item of historyData) {
        if (!used.has(item.itemName)) {
          used.add(item.itemName);
          uniqueItems.push(item);
        }
        if (uniqueItems.length >= 6) break;
      }

      historyRefButtons.innerHTML = uniqueItems.map((item) => {
        return `
          <button type="button" onclick="reuseHistory(${item.id})">
            ${escapeHtml(item.itemName)}
          </button>
        `;
      }).join("");
    }

    window.reuseHistory = function(id) {
      const item = historyData.find((h) => h.id === id);
      if (!item) return;

      itemName.value = item.itemName;
      tank.value = item.tank;
      ratio.value = item.ratio;

      if (fields.includes(item.field)) {
        fieldSelect.value = item.field;
      }

      updateResult();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.deleteHistory = function(id) {
      const ok = confirm("この履歴を削除しますか？");
      if (!ok) return;

      historyData = historyData.filter((item) => item.id !== id);
      saveHistory();
      renderHistory();
      renderHistoryRefButtons();
    };

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}/${m}/${d}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // =========================
    // CSV / バックアップ
    // =========================
    csvBtn.addEventListener("click", () => {
      if (!IS_PREMIUM) return;
      exportHistoryCsv();
    });

    csvFieldBtn.addEventListener("click", () => {
      if (!IS_PREMIUM) return;
      exportFieldCsv();
    });

    backupBtn.addEventListener("click", () => {
      if (!IS_PREMIUM) return;
      backupData();
    });

    restoreBtn.addEventListener("click", () => {
      if (!IS_PREMIUM) return;
      restoreFileInput.click();
    });

    restoreFileInput.addEventListener("change", (e) => {
      if (!IS_PREMIUM) return;
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data.history) || !Array.isArray(data.fields)) {
            throw new Error("形式が違います");
          }

          historyData = data.history;
          fields = data.fields;
          saveHistory();
          saveFields();
          renderFields();
          renderHistory();
          renderHistoryRefButtons();
          alert("復元しました。");
        } catch (err) {
          alert("復元に失敗しました。JSONファイルを確認してください。");
        }
      };
      reader.readAsText(file, "utf-8");
    });

    function exportHistoryCsv() {
      if (historyData.length === 0) {
        alert("履歴がありません。");
        return;
      }

      const rows = [
        ["日付", "園場", "作物・薬剤名", "タンク容量(L)", "希釈倍率", "薬量(ml)", "薬量(L)"],
        ...historyData.map(item => [
          item.date,
          item.field,
          item.itemName,
          item.tank,
          item.ratio,
          item.amountMl,
          item.amountL
        ])
      ];

      downloadCsv(rows, "nouyaku_history.csv");
    }

    function exportFieldCsv() {
      if (historyData.length === 0) {
        alert("履歴がありません。");
        return;
      }

      const selectedField = fieldSelect.value;
      const filtered = historyData.filter(item => item.field === selectedField);

      if (filtered.length === 0) {
        alert("この園場の履歴がありません。");
        return;
      }

      const rows = [
        ["日付", "園場", "作物・薬剤名", "タンク容量(L)", "希釈倍率", "薬量(ml)", "薬量(L)"],
        ...filtered.map(item => [
          item.date,
          item.field,
          item.itemName,
          item.tank,
          item.ratio,
          item.amountMl,
          item.amountL
        ])
      ];

      downloadCsv(rows, `${selectedField}_history.csv`);
    }

    function downloadCsv(rows, filename) {
      const csvContent = rows
        .map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(","))
        .join("\r\n");

      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function backupData() {
      const data = {
        history: historyData,
        fields: fields
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "nouyaku_backup.json";
      link.click();
      URL.revokeObjectURL(link.href);
    }
  </script>
</body>
</html>
